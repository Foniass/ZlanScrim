name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 178.105.219.195
          username: zlanscrim
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -euxo pipefail
            cd /opt/zlanscrim
            echo "::group::git pull"
            git fetch --quiet
            git reset --hard origin/main --quiet
            git log -1 --format='HEAD: %h %s'
            echo "::endgroup::"

            echo "::group::npm ci"
            npm ci
            echo "::endgroup::"

            echo "::group::prisma + build"
            set -a && source /etc/zlanscrim/.env && set +a
            npx prisma migrate deploy
            npx prisma generate
            npm run build
            echo "::endgroup::"

            echo "::group::restart"
            # NOTE: systemd unit changes require a one-time manual `sudo cp` +
            # daemon-reload on the VPS (the zlanscrim user can't sudo cp).
            sudo /bin/systemctl restart zlanscrim
            sleep 2
            systemctl is-active zlanscrim
            echo "::endgroup::"
